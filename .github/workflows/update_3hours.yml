name: 3시간 주기 KPX 실적 수집

on:
  schedule:
    - cron: '0 */3 * * *'   # UTC 매 3시간 (한국시간 = +9h)
  workflow_dispatch:

jobs:
  update-kpx-actual:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: KPX 실적 수집 실행
        run: python utils/run_3hours.py
        # KPX past API는 인증키 불필요하므로 env 없음

      - name: DB 자동 커밋
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "[자동] KPX 실적 데이터 업데이트"
          file_pattern: database/jeju_energy.db
